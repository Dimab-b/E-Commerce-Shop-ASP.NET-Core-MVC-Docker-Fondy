version: '3.4'

services:
  web_app:
    image: firstsiteshopwithmvc
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7102:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - PaymentSettings__MerchantId=${FONDY_MERCHANT_ID}
      - PaymentSettings__SecretKey=${FONDY_SECRET_KEY}
    depends_on:
      - db

  db:
    image: mysql:8.0
    ports:
      - "3307:3306" 
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: